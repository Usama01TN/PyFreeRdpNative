name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Lint + unit tests on every push, no native FreeRDP needed. Runs on all
  # three host OSes to catch platform-specific candidate-list / loader bugs.
  # ---------------------------------------------------------------------------
  unit:
    name: unit (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # 3.8 is the floor: f-strings would force 3.6+ but we don't use
        # them; class-attribute access patterns we use work all the way
        # back. We still pick 3.8 as the floor since older Pythons have
        # been EOL for a long time.
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: |
          ruff check pyfreerdp tests
      - name: Static syntax check (no Py3-only features)
        # We deliberately keep the source Py2-syntax-compatible. This step
        # asserts no f-string, annotation, dataclass, walrus, or match
        # leaked back in.
        run: |
          python scripts/check_py2_syntax.py
      - name: Unit tests (no native lib)
        run: |
          pytest -v -m "not needs_lib"

  # ---------------------------------------------------------------------------
  # Integration: install FreeRDP from apt (client + server + winpr), then
  # run the needs_lib-marked tests so we exercise the loader and the
  # bind_client / bind_server / bind_winpr paths against a real shared library.
  # ---------------------------------------------------------------------------
  integration-linux:
    name: integration (linux, system FreeRDP)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install FreeRDP from apt (client + server + winpr)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfreerdp-client3-3 \
            libfreerdp-server3-3 \
            libfreerdp3-3 \
            libwinpr3-3
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run needs_lib tests
        run: |
          pytest -v -m needs_lib
      - name: Confirm all three halves loadable
        run: |
          python -c "
          import pyfreerdp
          c = pyfreerdp.find_freerdp_library()
          s = pyfreerdp.find_freerdp_server_library()
          w = pyfreerdp.find_winpr_library()
          print('client:', c)
          print('server:', s)
          print('winpr: ', w)
          assert c, 'client lib not found'
          assert s, 'server lib not found'
          assert w, 'winpr lib not found'
          "

  # ---------------------------------------------------------------------------
  # Build FreeRDP from source with --profile=full and verify all libraries
  # land in pyfreerdp/_libs/. This is the slow path - only on workflow_dispatch
  # or PRs touching the build script.
  # ---------------------------------------------------------------------------
  build-from-source:
    name: build FreeRDP from source (--profile=full)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.modified, 'scripts/build_freerdp.py')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install FreeRDP build deps (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build git pkg-config \
            libssl-dev zlib1g-dev \
            libx11-dev libxext-dev libxrandr-dev libxinerama-dev \
            libxfixes-dev libxcursor-dev libxi-dev libxv-dev \
            libxkbfile-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols \
            libasound2-dev libpng-dev libjpeg-dev libcairo2-dev
      - name: Build FreeRDP (full profile)
        run: |
          python scripts/build_freerdp.py --target host --profile full --jobs 4
      - name: Assert all halves staged
        run: |
          ls -1 pyfreerdp/_libs/ | tee /tmp/libs.txt
          grep -q 'freerdp-client' /tmp/libs.txt
          grep -q 'freerdp-server' /tmp/libs.txt
          grep -q 'winpr' /tmp/libs.txt
      - name: Run full test matrix against bundled libs
        run: |
          pip install -e .[dev]
          pytest -v
